<main class="tasks-container">
  <header>
    <h2>My Tasks</h2>

    <app-task-filter-bar
      [categories]="categories()"
      [(selectedCategoryIds)]="selectedCategoryIds"
      [(selectedStatus)]="selectedStatus"
      (onSearch)="searchTerm.set($event); fetchTasks()"
    />
  </header>

  @if (isLoading()) {
    <p class="loading">Loading your tasks...</p>
  }

  <ul class="task-list">
    @for (task of tasks(); track task.id) {
      <app-task-card
        [task]="task"
        (onToggle)="toggleTask($event)"
        (onEdit)="openTaskEditMenu($event)"
      />
    } @empty {
      @if (!isLoading()) {
        <p class="empty-state">No tasks found.</p>
      }
    }
  </ul>

  <app-task-pagination
    [currentPage]="currentPage()"
    [pageSize]="pageSize()"
    [tasksCount]="tasks().length"
    [isLoading]="isLoading()"
    (onNext)="nextPage()"
    (onPrevious)="previousPage()"
  />

  @if (taskToEdit(); as task) {
    <div class="modal-overlay" (click)="closeTaskEditMenu()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <app-task-edit
          [task]="task"
          [categories]="categories()"
          (onClose)="closeTaskEditMenu()"
          (onSave)="updateTask(task.id, $event)"
        />
      </div>
    </div>
  }
  <button (click)="logout()">logout</button>
</main>
