<main class="bg-brand-dark min-h-screen flex flex-col items-center justify-center">
  <h1 class="text-9xl font-bold select-none">TODO</h1>
  <div class="w-full max-w-md">
    <header class="flex justify-around mt-1 bg-brand-surface border-brand-border border-t border-x rounded-t-2xl">
      <button type="button"
        [class.active]="currentForm() === 'login'"
        (click)="showLoginForm()"
        class="flex-1 py-3 transition-all"
        >
        Login
      </button>
      <button type="button"
        [class.active]="currentForm() === 'register'"
        (click)="showRegisterForm()"
        class="flex-1 py-3 transition-all"
        >
        Register
      </button>
    </header>

    <section class="p-4 bg-brand-surface border-brand-border border-b border-x rounded-b-2xl">
      @if (currentForm() === 'login') {
      <app-login-by-username />
      } @else {
      <app-register-by-username />
      }
    </section>
  </div>
</main>
