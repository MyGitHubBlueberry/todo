<main class="bg-brand-dark min-h-screen flex flex-col items-center justify-center">
  <div class="w-full max-w-md">
    <h1 class="text-6xl md:text-8xl lg:text-9xl font-bold text-brand-text select-none text-center mb-8 tracking-wide transition-all">
      TODO
    </h1>
    <header class="flex mt-1 rounded-t-2xl overflow-hidden border-t border-x border-brand-border">

      <button type="button"
        (click)="showLoginForm()"
        class="flex-1 py-3 transition-all font-semibold"
        [class]="currentForm() === 'login'
          ? 'bg-brand-surface text-brand-text border-b-2 border-brand-primary'
          : 'bg-brand-dark text-brand-muted hover:text-brand-text hover:bg-brand-surface/50'">
        Login
      </button>

      <button type="button"
        (click)="showRegisterForm()"
        class="flex-1 py-3 transition-all font-semibold border-brand-border"
        [class]="currentForm() === 'register'
          ? 'bg-brand-surface text-brand-text border-b-2 border-brand-primary'
          : 'bg-brand-dark text-brand-muted hover:text-brand-text hover:bg-brand-surface/50'">
        Register
      </button>
    </header>

    <section class="p-4 bg-brand-surface border-brand-border border-b border-x rounded-b-2xl">
      @if (currentForm() === 'login') {
      <app-login-by-username />
      } @else {
      <app-register-by-username />
      }
    </section>
  </div>
</main>
