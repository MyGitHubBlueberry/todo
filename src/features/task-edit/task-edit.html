<app-modal-layout
  [title]="'Edit Task: ' + updatedTask.title"
  (onClose)="onClose.emit()"
  (onSave)="onSave.emit(updatedTask)"
>
  <label for="task-title">
    Title
    <input id="task-title" type="text" maxlength="25" required [(ngModel)]="updatedTask.title">
  </label>

  <app-task-categories
    [categories]="categories()"
    [(selectedCategoryIds)]="updatedTask.categoryIds"
  />

  <label for="task-body">
    Description
    <input id="task-body" type="text" [(ngModel)]="updatedTask.body">
  </label>
</app-modal-layout>
