<app-modal-layout
  title="Delete Task"
  (onClose)="onClose.emit()"
>
  <div class="delete-warning mb-4">
    <p>Are you sure you want to permanently delete <strong>{{ task().title }}</strong>?</p>
    <p class="text-brand-muted text-sm mt-2">This action cannot be undone.</p>
  </div>

  <div modal-footer class="flex gap-3">
    <button
      class="btn-secondary flex-1"
      (click)="onClose.emit()"
    >
      Cancel
    </button>
    <button
      class="btn-danger flex-1"
      (click)="onConfirmDelete.emit(task().id)"
    >
      Delete
    </button>
  </div>
</app-modal-layout>
