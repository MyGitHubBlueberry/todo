<app-modal-layout
  title="Task Categories"
  [button]="isCategoryCreateForm ? 'Create Category' : 'Add To Filters'"
  [isButtonDisabled]="isCategoryCreateForm && newCategoryName().length === 0"
  (onClose)="onClose.emit()"
  (onSave)="handleSave()"
  >
  @if (!isCategoryCreateForm) {
    <app-task-categories
      [categories]="categories()"
      [(selectedCategories)]="selectedCategories"
    />
    <button type="button" (click)="isCategoryCreateForm=true">New Category</button>
  } @else {
    <label for="name">
      Name
      <input id="name" type="text" [(ngModel)]="newCategoryName"/>
    </label>
    <button type="button" (click)="isCategoryCreateForm=false">Back</button>
  }
</app-modal-layout>
