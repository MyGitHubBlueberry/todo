<div class="modal-overlay" (click)="onClose.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center">
      <h2 class="font-semibold text-xl">{{ title() }}</h2>
      <button
        (click)="onClose.emit()"
        class="btn-secondary group w-6 h-6 flex items-center justify-center shrink-0"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-x-icon lucide-x"
          class="stroke-brand-border group-hover:stroke-brand-muted transition-colors"
        >
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </div>

    <ng-content />

    <button
      [disabled]="isButtonDisabled()"
      (click)="onSave.emit()"
      class="btn-primary"
    >
      {{ button() }}
    </button>
  </div>
</div>
