<form [formGroup]="formGroup()" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">
  <label class="form-label">
    Login:
    <input type="text" formControlName="login" class="form-input" />
  </label>
  <ng-content select="[login-errors]" />

  <label class="form-label">
    Password:
    <input type="password" formControlName="password" class="form-input" />
  </label>
  <ng-content select="[password-errors]" />

  <ng-content />

  <button type="submit"
    [disabled]="formGroup().invalid"
    class="btn-primary">
    {{ submitButtonText() }}
  </button>

  @if (backendError()) {
    <div class="p-3 bg-brand-danger/30 border border-brand-danger rounded-lg text-center">
      <span class="text-white text-sm font-medium">
        ⚠️ {{ backendError() }}
      </span>
    </div>
  }
</form>
