<li class="flex flex-col gap-2 p-3 bg-brand-surface rounded-lg border border-brand-border">
  <div class="flex justify-between items-center gap-4">
    <label class="flex items-center gap-3 cursor-pointer flex-1 min-w-0 font-semibold">
      <input
        type="checkbox"
        class="custom-checkbox"
        [checked]="task().status === 'Done'"
        (change)="onToggle.emit(task())"
      />
      <span class="truncate" [class.completed]="task().status === 'Done'">
        {{ task().title }}
      </span>
    </label>

    <div class="flex items-center gap-3 shrink-0">
      <p class="text-xs text-brand-muted whitespace-nowrap">
        @if (task().isEdited) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15" height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-pencil-icon lucide-pencil"
            class="stroke-brand-muted inline"
          >
            <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
            <path d="m15 5 4 4"/>
          </svg>
        }
        {{ (task().isEdited ? task().updatedAt : task().createdAt) | date: 'MMM d, HH:mm' }}
      </p>
      <button
        (click)="onEdit.emit(task())"
        class="text-xs font-semibold text-brand-primary hover:text-brand-primary-hover"
      >
        Edit
      </button>
    </div>
  </div>

  @if (task().body && task().body?.trim() != '') {
    <div class="relative mt-2">
      <p class="text-sm text-brand-muted transition-all break-words"
         [class.line-clamp-3]="!isExpanded()">
        {{ task().body }}
      </p>

      @if ((task().body?.length ?? 0) > 100) {
        <button
          (click)="toggleExpand()"
          class="text-xs font-semibold text-brand-primary mt-1 hover:underline"
        >
          {{ isExpanded() ? 'Show less' : 'Show more' }}
        </button>
      }
    </div>
  }
</li>
